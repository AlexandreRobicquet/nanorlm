<rect x="770" y="124" width="292" height="34" rx="17" fill="#dff2e7" stroke="none" stroke-width="0"/>
<text x="784" y="147" text-anchor="start" font-family="Menlo, ui-monospace, SFMono-Regular, monospace" font-size="14" font-weight="700" fill="#2a2f38">3. Retain under budget, answer from memory</text>
