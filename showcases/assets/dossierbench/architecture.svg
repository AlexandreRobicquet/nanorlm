<text x="40" y="48" text-anchor="start" font-family="Menlo, ui-monospace, SFMono-Regular, monospace" font-size="30" font-weight="700" fill="#2a2f38">What nanoRLM Builds</text>
<text x="40" y="78" text-anchor="start" font-family="Menlo, ui-monospace, SFMono-Regular, monospace" font-size="16" font-weight="400" fill="#5a6170">Recursive inference with explicit memory retention: recurse, inspect, retain under budget, then answer from kept evidence.</text>
