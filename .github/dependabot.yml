version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Paris"
    groups:
      github-actions:
        patterns:
          - "*"
    commit-message:
      prefix: "chore"

  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:15"
      timezone: "Europe/Paris"
    groups:
      python-dependencies:
        patterns:
          - "*"
    commit-message:
      prefix: "chore"
