  <polygon points="731,338 740,350 749,338" fill="#242933"/>
  <rect x="588" y="350" width="304" height="42" rx="18" fill="#fffdf7" stroke="#242933" stroke-width="2"/>
  <text x="740" y="377" text-anchor="middle" font-family="Menlo, ui-monospace, SFMono-Regular, monospace" font-size="16" font-weight="700" fill="#242933">answer = amber orbit</text>
